sfm:
  embed_dim: 768
  expr_hidden_dim: 768
  expr_dropout: 0.1
  expr_value_scale: 1.0
  mod_hidden_dim: 768
  mod_dropout: 0.1
  cond_dropout: 0.1
  context_hidden_dim: 768
  context_dropout: 0.1
  embedding_dropout: 0.1
  gene_embedding_ckpt: checkpoints/gene_embeddings.pt
  freeze_loaded_gene_embeddings: false
  num_layers: 12
  num_heads: 12
  backbone_mlp_hidden_dim: 3072
  attn_dropout: 0.1
  backbone_mlp_dropout: 0.1
  use_rotary: false
  qkv_bias: true
  out_bias: true
  backbone_mlp_bias: true
  norm_eps: 1.0e-6
  rotary_base: 10000.0
  rotary_interleaved: false
  num_factors: 256
  router_hidden_dim: 128
  router_dropout: 0.1
  topk: 32
  router_temperature: 1.0
  beta_momentum: 1.0

vgae:
  hidden_dim: 256
  dropout: 0.1
  fp_steps: 3
  fp_damping: 0.5
