model_source: assets

runtime:
  # Keep evaluation on the same safer attention backend used by pretraining.
  attention_backend: fa2
  precision:
    model_dtype: fp32
    autocast_dtype: bf16
  fsdp:
    enabled: false
    sharding_strategy: FULL_SHARD
    use_orig_params: true
    limit_all_gathers: true

data:
  train_paths: /scratch/kxu248/data/GRN/datasets/hESC.h5ad
  shuffle_train_paths: false
  shuffle_train_paths_seed: 0
  batch_size: 64
  num_workers: 0
  pin_memory: true
  drop_last: false
  max_length: 4096
  gene_key: null
  platform_key: null
  species_key: species
  tissue_key: null
  disease_key: disease
  expr_pad_value: 0.0
  preprocess:
    enabled: true
    min_genes: 200
    min_cells: 3
    max_pct_counts_mt: 20.0
    target_sum: 10000.0
    log1p: true
    n_top_genes: 4095
    hvg_flavor: seurat
    subset_hvg: true
    remove_mito_genes: true
    remove_ribo_genes: true
    remove_hb_genes: true
    sanitize_X: true
    X_fill_value: 0.0
    inplace: false

evaluator:
  checkpoint_path: null
  aggregation: dataset
  evaluation_grn_path:
    - /scratch/kxu248/data/GRN/networks/hESC-ChIP-seq.csv
    - /scratch/kxu248/data/GRN/networks/hChIP-seq.csv
    - /scratch/kxu248/data/GRN/networks/hSTRING.csv
  foundation_name: sfm
