model_source: assets

runtime:
  # Keep evaluation on the same safer attention backend used by pretraining.
  attention_backend: fa2
  precision:
    model_dtype: fp32
    autocast_dtype: bf16
  fsdp:
    enabled: false
    sharding_strategy: FULL_SHARD
    use_orig_params: true
    limit_all_gathers: true

data:
  batch_size: 64
  num_workers: 0
  pin_memory: true
  drop_last: false
  max_length: 1024
  gene_key: null
  platform_key: null
  species_key: species
  tissue_key: null
  disease_key: disease
  expr_pad_value: 0.0
  preprocess:
    enabled: true
    min_genes: 200
    min_cells: 3
    max_pct_counts_mt: 20.0
    target_sum: 10000.0
    log1p: false
    n_top_genes: 1023
    hvg_flavor: seurat
    subset_hvg: true
    remove_mito_genes: true
    remove_ribo_genes: true
    remove_hb_genes: true
    sanitize_X: true
    X_fill_value: 0.0
    inplace: false

evaluator:
  checkpoint_path: null
  aggregation: dataset
  candidate_source_universe: supported_tfs
  evaluation_pairs:
    - dataset_path: /scratch/kxu248/data/GRN/datasets/hESC.h5ad
      grn_path: /scratch/kxu248/data/GRN/networks/hESC-ChIP-seq.csv
    - dataset_path: /scratch/kxu248/data/GRN/datasets/hESC.h5ad
      grn_path: /scratch/kxu248/data/GRN/networks/hChIP-seq.csv

    - dataset_path: /scratch/kxu248/data/GRN/datasets/hHep.h5ad
      grn_path: /scratch/kxu248/data/GRN/networks/hHep-ChIP-seq.csv
    - dataset_path: /scratch/kxu248/data/GRN/datasets/hHep.h5ad
      grn_path: /scratch/kxu248/data/GRN/networks/hChIP-seq.csv

    - dataset_path: /scratch/kxu248/data/GRN/datasets/mDC.h5ad
      grn_path: /scratch/kxu248/data/GRN/networks/mDC-ChIP-seq.csv
    - dataset_path: /scratch/kxu248/data/GRN/datasets/mDC.h5ad
      grn_path: /scratch/kxu248/data/GRN/networks/mChIP-seq.csv

    - dataset_path: /scratch/kxu248/data/GRN/datasets/mESC.h5ad
      grn_path: /scratch/kxu248/data/GRN/networks/mESC-ChIP-seq.csv
    - dataset_path: /scratch/kxu248/data/GRN/datasets/mESC.h5ad
      grn_path: /scratch/kxu248/data/GRN/networks/mChIP-seq.csv

    - dataset_path: /scratch/kxu248/data/GRN/datasets/mHSC-E.h5ad
      grn_path: /scratch/kxu248/data/GRN/networks/mHSC-ChIP-seq.csv
    - dataset_path: /scratch/kxu248/data/GRN/datasets/mHSC-E.h5ad
      grn_path: /scratch/kxu248/data/GRN/networks/mChIP-seq.csv
      
    - dataset_path: /scratch/kxu248/data/GRN/datasets/mHSC-GM.h5ad
      grn_path: /scratch/kxu248/data/GRN/networks/mHSC-ChIP-seq.csv
    - dataset_path: /scratch/kxu248/data/GRN/datasets/mHSC-GM.h5ad
      grn_path: /scratch/kxu248/data/GRN/networks/mChIP-seq.csv

    - dataset_path: /scratch/kxu248/data/GRN/datasets/mHSC-L.h5ad
      grn_path: /scratch/kxu248/data/GRN/networks/mHSC-ChIP-seq.csv
    - dataset_path: /scratch/kxu248/data/GRN/datasets/mHSC-L.h5ad
      grn_path: /scratch/kxu248/data/GRN/networks/mChIP-seq.csv
