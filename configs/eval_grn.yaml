model_source: assets

runtime:
  # Keep evaluation on the same FA4 backend used by the B200 pretraining jobs.
  attention_backend: fa4
  precision:
    model_dtype: fp32
    autocast_dtype: bf16
  fsdp:
    enabled: false
    sharding_strategy: FULL_SHARD
    use_orig_params: true
    limit_all_gathers: true

data:
  batch_size: 512
  num_workers: 0
  pin_memory: true
  drop_last: false
  # Evaluation uses a special GRN universe: all asset-supported TFs for the
  # h5ad species are retained first, then `n_top_genes` is computed only among
  # non-preserved target genes. Candidate sources are controlled separately by
  # `evaluator.candidate_source_universe`, while targets are active processed
  # genes. `max_length` must leave room for all TFs in addition to the HVG
  # target-gene budget.
  max_length: 4096
  gene_key: null
  platform_key: null
  species_key: species
  tissue_key: null
  disease_key: disease
  expr_pad_value: 0.0
  preprocess:
    enabled: true
    min_genes: 200
    min_cells: 3
    max_pct_counts_mt: 20.0
    target_sum: 10000.0
    log1p: false
    # In evaluation only, this is the number of HVG target genes. The evaluator
    # fills `preserve_gene_names` per h5ad with all asset-supported TFs for the species.
    n_top_genes: 1000
    hvg_flavor: seurat
    subset_hvg: true
    preserve_gene_names: []
    hvg_exclude_preserved_genes: true
    remove_mito_genes: true
    remove_ribo_genes: true
    remove_hb_genes: true
    sanitize_X: true
    X_fill_value: 0.0
    inplace: false

evaluator:
  checkpoint_path: null
  aggregation: dataset
  # Metrics to compute and write to results/summary_metrics.csv.
  # Supported: auprc, auprc_ratio, auroc, ep, ep_ratio. Use `all` for all metrics.
  metrics:
    - auprc
    - auroc
    - ep
  # Use label-supported TFs as candidate GRN sources.
  candidate_source_universe: supported_tfs
  evaluation_pairs:
    - dataset_path: /scratch/kxu248/data/GRN/datasets/hESC.h5ad
      grn_path: /scratch/kxu248/data/GRN/networks/hESC-ChIP-seq.csv

    - dataset_path: /scratch/kxu248/data/GRN/datasets/hHep.h5ad
      grn_path: /scratch/kxu248/data/GRN/networks/hHep-ChIP-seq.csv

    - dataset_path: /scratch/kxu248/data/GRN/datasets/mESC.h5ad
      grn_path: /scratch/kxu248/data/GRN/networks/mESC-ChIP-seq.csv

    - dataset_path: /scratch/kxu248/data/GRN/datasets/mHSC-E.h5ad
      grn_path: /scratch/kxu248/data/GRN/networks/mHSC-ChIP-seq.csv
      
    - dataset_path: /scratch/kxu248/data/GRN/datasets/mHSC-GM.h5ad
      grn_path: /scratch/kxu248/data/GRN/networks/mHSC-ChIP-seq.csv

    - dataset_path: /scratch/kxu248/data/GRN/datasets/mHSC-L.h5ad
      grn_path: /scratch/kxu248/data/GRN/networks/mHSC-ChIP-seq.csv

  foundation_name: sfm
