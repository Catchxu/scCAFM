datasets:
  adata_files: /data1021/xukaichen/data/GRN/datasets/hHep.h5ad
  token_dict: token_dict.csv
  human_tfs: human_tfs.csv
  mouse_tfs: mouse_tfs.csv
  eval_grn: /data1021/xukaichen/data/GRN/networks/hChIP-seq.csv

tokenizer:
  # Gene column in adata.var to use for token mapping.
  # null -> use adata.var_names
  gene_key: null
  platform_key: null
  species_key: null
  tissue_key: null
  disease_key: null

finetune:
  enabled: True
  # finetuning setting only use elbo loss
  epochs: 4
  learning_rate: 1e-5
  weight_decay: 1e-2
  batch_size: 4
  grad_accum_steps: 2
  log_interval: 100
  use_amp: True
  amp_dtype: bf16

eval:
  checkpoint_path: ./checkpoints/sfm_latest.pt
  batch_size: 64
  # GPU ids to expose to the run. Examples: [3] for single GPU, [2,3] for multi-GPU.
  # Set to [] to force CPU.
  devices: [3]
  output_dir: ./results
  log_dir: ./logs
  log_name: grn_eval.log
  log_overwrite: True
  log_interval: 100
  # Can be a single metric string or a list, e.g. [auprc_ratio, auroc_ratio].
  metric: [auprc_ratio, auroc]
  preprocess: True
  use_amp: True
  amp_dtype: bf16
