model_source: assets

runtime:
  # FA4 remains selectable here, but the current flash_attn.cute backward path
  # fails on this Slurm environment. FA2 is the runnable default for now.
  attention_backend: fa4
  precision:
    model_dtype: fp32
    autocast_dtype: bf16
  fsdp:
    enabled: true
    sharding_strategy: FULL_SHARD
    use_orig_params: true
    limit_all_gathers: true

data:
  train_paths: /scratch/kxu248/data/Atlas/
  shuffle_train_paths: true
  shuffle_train_paths_seed: 42
  batch_size: 24
  gradient_accumulation_steps: 8
  num_workers: 0
  pin_memory: false
  drop_last: false
  max_length: 4096
  gene_key: feature_id
  platform_key: assay
  species_key: species
  tissue_key: tissue
  disease_key: disease
  expr_pad_value: 0.0
  condition_vocab:
    regenerate: false
  condition_mask:
    enabled: true
    unk_ratio: 0.1
  preprocess:
    enabled: true
    min_genes: 200
    min_cells: 3
    max_pct_counts_mt: 20.0
    target_sum: 10000.0
    log1p: true
    n_top_genes: 4095
    hvg_flavor: seurat
    subset_hvg: true
    remove_mito_genes: true
    remove_ribo_genes: true
    remove_hb_genes: true
    sanitize_X: true
    X_fill_value: 0.0
    inplace: false

frozen_sfm:
  checkpoint_path: null

efm:
  init_from_sfm: true
  embed_dim: 768
  expr_num_bins: 32
  expr_hidden_dim: 128
  expr_tau: 1.0
  batch_num_bins: 128
  batch_hidden_dim: 128
  batch_tau: 1.0
  cond_dropout: 0.1
  out_dropout: 0.1
  freeze_loaded_gene_embeddings: false
  num_layers: 12
  num_heads: 12
  backbone_mlp_hidden_dim: 3072
  backbone_mlp_dropout: 0.02
  use_rotary: true
  qkv_bias: true
  out_bias: true
  backbone_mlp_bias: true
  norm_eps: 1.0e-6
  rotary_base: 10000.0
  rotary_interleaved: false
  head_hidden_dim: 768
  head_dropout: 0.1

optimizer:
  name: adamw
  lr: 0.0001
  betas: [0.9, 0.95]
  eps: 1.0e-8
  weight_decay: 0.05

scheduler:
  name: cosine_with_warmup
  warmup_ratio: 0.03
  min_lr_ratio: 0.1

loss:
  lambda_exp: 1.0

trainer:
  epochs: 1
  grad_clip_norm: 1.0
